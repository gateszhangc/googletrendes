<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Trends Atlas</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-mark">
        <span class="brand-dot"></span>
        <div>
          <strong>Trends Atlas</strong>
          <small>Google Trends 工作台</small>
        </div>
      </div>

      <div class="filter-group">
        <label>抓取日期</label>
        <select id="collectedDate"><option value="">全部日期</option></select>
      </div>

      <div class="filter-group">
        <label>搜索</label>
        <input id="search" type="search" placeholder="关键词 / 翻译 / AI 翻译">
      </div>

      <div class="filter-group">
        <label>国家</label>
        <select id="geo"><option value="">全部国家</option></select>
      </div>

      <div class="filter-group">
        <label>分类</label>
        <select id="category"><option value="">全部分类</option></select>
      </div>

      <div class="filter-group">
        <label>翻译状态</label>
        <select id="translated">
          <option value="">全部</option>
          <option value="yes">已 AI 翻译</option>
          <option value="no">未 AI 翻译</option>
        </select>
      </div>

      <div class="filter-group">
        <label>涨幅类型</label>
        <select id="change">
          <option value="">全部</option>
          <option value="breakout">飙升</option>
          <option value="percent">百分比</option>
        </select>
      </div>

      <button id="reset" class="soft-button">重置筛选</button>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="batchLabel">最新抓取批次</p>
          <h1>全球上升搜索查询</h1>
        </div>
        <div class="status-pill" id="status">读取中...</div>
      </header>

      <section class="metrics" id="metrics"></section>

      <section class="canvas-grid">
        <article class="panel">
          <div class="panel-heading">
            <h2>国家分布</h2>
            <span>Top 12</span>
          </div>
          <div id="geoChart" class="bar-list"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h2>分类分布</h2>
            <span>Top 12</span>
          </div>
          <div id="categoryChart" class="bar-list"></div>
        </article>
      </section>

      <section class="table-panel">
        <div class="table-toolbar">
          <div>
            <h2>查询明细</h2>
            <p id="resultCount">0 条记录</p>
          </div>
          <div class="pager">
            <button id="prev" class="soft-button">上一页</button>
            <label class="page-jump">
              <span>页</span>
              <input id="pageJump" type="number" min="1" value="1">
              <span id="pageTotal">/ 1</span>
            </label>
            <button id="jumpPage" class="soft-button">跳转</button>
            <button id="next" class="soft-button">下一页</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>query</th>
                <th>AI 翻译</th>
                <th>原翻译</th>
                <th>国家</th>
                <th>分类</th>
                <th>涨幅</th>
                <th>日期</th>
                <th>来源</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
